;******************************************************
;*  For Power Manager (Windows8)                      *
;*       PWMPDFV_W8.ini  =  PWMPDFV2.ini              *
;******************************************************
;******************************************************
;*  Predefined power scheme data                      *
;******************************************************
;Schemes=Total of predefined power schemes
;
; Control section
;
[CONTROL]
Schemes=8

;*****************************************
;*  predefined power scheme data         *
;*****************************************
:SchemeTypeAC=a a=0:Power Saver, 1:High performance, 2:Ballanced
:SchemeTypeDC=a
;MonitorOffTimerAC=mm(sec)
;MonitorOffTimerDC=mm(sec)
;HddOffTimerAC=mm(sec)
;HddOffTimerDC=mm(sec)
;StandbyTimerAC=mm(sec)
;StandbyTimerDC=mm(sec)
;HibernateTimerAC=mm(sec)
;HibernateTimerDC=mm(sec)
;DispBrtnessAC=d d=0:Lowest, 100: Highest (from 8 steps to 101 steps)
;DispBrtnessDC=d
;DispBrtnessAC_16=e e=0:Lowest, 100: Highest (for 101 steps brightness)
;DispBrtnessDC_16=e
;CpuSpeedAC=c c=0:Undefined,1:Maximum,2:Medium,3:Slow,4:Very Slow
;CpuSpeedDC=c
;C4AC=s s=0:Disabled,1:Enabled
;C4DC=s
;FanSpeedAC=f f=0:Undefined,1:Fast, 2:Medium, 3:Slow
;FanSpeedDC=f
;OptiFanControlAC=o 0:Undefined,1:Maximize performance, 2:Balance, 3:Minimize fan sound, 4:Minimize temperature
;OptiFanControlDC=o
;AutoOddAC=s s=0:Disabled,1:Enabled
;AutoOddDC=s
;AirplaneModeAC=s s=0:Disabled,1:Enabled
;AirplaneModeDC=s
;GfxPowerSettingsAC= 0:Maximum Battery Life, 1:Balanced, 2:Maximum Performance
;GfxPowerSettingsDC= (ditto)
;GpuSwitchAc=g g=0:Disabled,1:Enabled
;GpuSwitchDc=g
;BrtnessIdleTimerAC=mm(sec)
;BrtnessIdleTimerDC=mm(sec)
;BrtnessWhenIdleAC=d
;BrtnessWhenIdleDC=d
;BrtnessWhenIdleAC_16=e
;BrtnessWhenIdleDC_16=e
;RRateIdleTimerAC=mm(sec)
;RRateIdleTimerDC=mm(sec)
;RRateWhenIdleAC=r r=0:Default, 1:Medium, 2:Low
;RRateWhenIdleDC=r
;DimBrtnessAC=d
;DimBrtnessDC=d
;DimBrtnessAC_16=e
;DimBrtnessDC_16=e
;DimBrtnessTimerAC=mm(sec)
;DimBrtnessTimerDC=mm(sec)
;nVidiaHybridAC=d d=0:Integrated Graphics, 1:NVIDIA GPU
;nVidiaHybridDC=d
;DiscreteGpuTimerAC=e e=0:2mins, 1:5mins, 2:10mins, 3:15mins, 4:30mins, 5:45mins, 6:1hour, 7:2hours, 8:3hours, 9:Never
;DiscreteGpuTimerDC=e
;DeepIdleAC=mm(min) Forever=71582788
;DeepIdleDC=mm(min)
;CpuTurboAC=f f=0:Disable, 1:Enable
;CpuTurboDC=f
;SupportType=g g=0:No, 1:w/o Fan and ATM, 2:w Legacy Fan, 4:w ATM 2mode, 8:w ATM 4mode
;ProhibitModification=p g=Bit 0: 1=Prohibit deletion  Bit 1: 1=Prohibit editing  Bit 2: 1=Prohibit renaming
;---------------------------
;Advanced settings 1
;---------------------------
;Sleep_AllowHybridAC= 0:Off, 1:On
;Sleep_AllowHybridDC= (ditto)
;Sleep_AllowWakeAC= 0:Disable, 1:Enable
;Sleep_AllowWakeDC= (ditto)
;Wireless_PowerSavingAC= 0:Maximum Performance, 1:Low Power Saving 2:Medium Power Saving, 3:Maximum Power Saving
;Wireless_PowerSavingDC= (ditto)
;PCI_LinkStateAC= 0:Off, 1:Moderate power savings, 2:Maximum power saving
;PCI_LinkStateDC= (ditto)
;Multi_SharingActionAC= 0:Allow the computer to sleep, 1:Prevent idling to sleep, 2:Allow the computer to enter Away Mode
;Multi_SharingActionDC= (ditto)
;Multi_PlayingVideoAC= 0:Optimize video quality, 1:Balanced, 2:Optimize power savings
;Multi_PlayingVideoDC= (ditto)
;Display_AdaptiveAC= 0:Off, 1:On
;Display_AdaptiveDC= (ditto)
;Search_PowerSavingAC= 0:Power saving, 1:Balanced, 2:High performance
;Search_PowerSavingDC= (ditto)
;USB_SelectiveSuspendAC= 0:Disabled, 1:Enabled
;USB_SelectiveSuspendDC= (ditto)
;Desktop_SlideShowAC= 0:Available, 1:Paused
;Desktop_SlideShowDC= (ditto)
;Processor_CoolingAC= 0:Passive, 1:Active
;Processor_CoolingDC= (ditto)
;---------------------------
;Advanced settings 2
;---------------------------
;FnF4AC= 0:Do nothing, 1:Sleep 2:Hibernate, 3:Shut down
;FnF4DC= (ditto)
;PowerBtnAC= 0:Do nothing, 1:Sleep 2:Hibernate, 3:Shut down
;PowerBtnDC= (ditto)
;LidCloseAC= 0:Do nothing, 1:Sleep 2:Hibernate, 3:Shut down
;LidCloseDC= (ditto)
;StartMenuPowerBtnAC= 0:Sleep, 1:Hibernate, 2:Shut down
;StartMenuPowerBtnDC= (ditto)
;RequirePasswordAC= 0:No, 1:Yes
;RequirePasswordDC= (ditto)
;---------------------------
;Advanced settings 3
;---------------------------
;LowBatt_AtAC= xx(%)
;LowBatt_AtDC= (ditto)
;LowBatt_NotifyAC= 0:Off, 1:On
;LowBatt_NotifyDC= (ditto)
