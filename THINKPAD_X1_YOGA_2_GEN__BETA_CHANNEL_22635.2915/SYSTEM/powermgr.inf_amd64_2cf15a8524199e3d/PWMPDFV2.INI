;DispBrtness=d d=0->100 Level (from 8 steps to 101 steps)
;DispBrtness=e e=0->100 Level (for 101 steps brightness)
;CpuSpeed=c c=0:Maximum,1:Medium,2:Slow,3:Very Slow
;C4=s s=0:Disabled,1:Enabled
;FanSpeed=c e=1:Fast,2:Medium,3:Slow
;AutoOdd=s s=0:Disabled,1:Enabled
;AirplaneMode=s s=0:Disabled,1:Enabled
;GfxPowerSettings= 0:Maximum Battery Life, 1:Balanced, 2:Maximum Performance
